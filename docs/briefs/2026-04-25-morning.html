  .market-card .change { font-family:'DM Mono',monospace; font-size:11px; }

ocking, implying confidence in spare capacity availability\u2014but if supply disruptions accelerate or persist, California's export-constrained refining base becomes a bottleneck, creating regional energy inflation that could pressure consumer margins and wage demands disproportionately in high-energy-intensity sectors.", "source": "The Guardian", "link": "https://news.google.com/rss/articles/CBMigAFBVV95cUxQMkg4WUZ6MnNWaWhtWlhtZHprV0hOWEFZaXdJRVZTcDd2dkxBdUZ4bEYwQUt4eFdKUk9RekJaYXFIYjltZDM5d0FHd09zV2g5eEtRRXA3RExmNDlsVHl5X2t6Tmg2bU1ZSWg2b2RtcDZLZUgxZXRIMWhZcFhQU3V0WQ?oc=5"}, {"headline": "U.S. State Department Orders Global Warning About Chinese AI Thefts by DeepSeek and Others", "summary": "The State Department has issued guidance to diplomatic missions warning of alleged large-scale intellectual property theft by Chinese AI firms, including DeepSeek, targeting model architectures, training data, and compute infrastructure designs.", "insight": "If substantiated, this suggests DeepSeek's cost-competitive AI models may rely partly on reverse-engineered or stolen proprietary architectures rather than indigenous innovation\u2014a competitive asymmetry that weakens DeepSeek's moat and validates U.S. export controls on advanced semiconductors, but also signals that IP enforcement mechanisms are insufficient to prevent state-backed technology appropriation, creating perpetual re-commoditization pressure on U.S. AI advantage.", "source": "CNBC", "link": "https://news.google.com/rss/articles/CBMigwFBVV95cUxQUjJhb2VhdlFXWTBCVUZQa3ZLQ2ZfTjJFUE9lbzRQNmJGYzhFZXJFLTJ3RWdDb0NPT1hQZkdwcW5wMjFfalUzSHNzdWM2dkpLa25vbG1XMXd2Tmo0SmpFZWUxMkU5U2hCcy1xY1RpNmpSMUxPLURFaTZYVVFSUWlSU1dvUdIBiAFBVV95cUxOQ0kwYjI1eHhaVjRuaGtiNGRldGRNLVFLRXpaQnc1MVhlMkZodm1iRlQ2U2pyWndzUnJwRW5pS0hHTVpWR1puM0Z2dnN2clg1V19IeWFVbkZTWnR0eTRuV3g3Nm9iVXVQMnRrUUlMVDNzc0VpX1d2QXZoZEJCZGFnNjF0djVaTTZk?oc=5"}]}, {"name": "Culture & Sports", "stories": [{"headline": "NBA Playoff Games Today: Schedule and Viewing Information for April 25", "summary": "NBA playoff matches are scheduled for today with broadcast and streaming options available across major networks.", "insight": "Playoff viewership metrics will be tracked as signal of sports fan engagement and media consumption trends; weakness in playoff ratings would suggest cord-cutting and streaming migration are accelerating, reducing legacy media valuations and forcing sports leagues to diversify revenue through direct-to-consumer streaming platforms.", "source": "USA Today, Milwaukee Journal Sentinel", "link": "https://news.google.com/rss/articles/CBMirAFBVV95cUxQYnFabG9QSFNsQ29kakN3MjNMWWpvNkgyU0Z3Uk9XYTQwLVBZSTNvOUhjNFB3SkJFS21PV3hCbldiaFVoZEFDT2FKUkpwR1VpcFI4VThWaEtQYVQwOF92dlpRQldFOF96UmVZQTIwdHhIUnVCOWV5NHlOYmxfTjdJdUIxX2ZhbGpXVjB2aFlMSGQ5Ull3SEEyQTc3a19iTjhQeF9zaFUzaHo0azlf?oc=5"}, {"headline": "MLB Home Run Prop Bets and Predictions for Today", "summary": "Sports betting markets are offering home run prop bets with odds and predictions for today's MLB games.", "insight": "Growth in legal sports betting propensities increases real-money engagement with sports outcomes and creates derivative revenue streams for teams/leagues; it also embeds sports into personal financial decision-making, which may increase viewership stability during low-novelty game periods and lock in younger demographics to traditional sports properties.", "source": "Yahoo Sports", "link": "https://news.google.com/rss/articles/CBMihgFBVV95cUxPOUxCbFFHaVAtbkRUUTk2am1zb1JjX0J5c25ETGxlZ25ibkN4Xzg1TE1zMEtqY1lEQmhOTGNMYnlTRnZnSVlWYjh4dWtybVZYQUg3TnhhakVYNUk2UnotSXJfc0lPQlVQaHdiMGY4QjQ2Uno3UFpyMFEzRTltbjhzVDh5bnNWdw?oc=5"}]}, {"name": "Boston", "stories": [{"headline": "Two Children Found Dead Inside Wellesley, Massachusetts Home During Wellness Check", "summary": "Two children were discovered deceased in a Wellesley residence during a wellness investigation; authorities are conducting an investigation into the circumstances.", "insight": "Wellness-check protocols and child protective service responsiveness will face scrutiny; if systemic failures are identified, it may accelerate policy changes around mandatory reporting and emergency intervention timelines, affecting liability exposure for schools, healthcare providers, and social service agencies across Massachusetts.", "source": "CBS News, Boston 25 News", "link": "https://news.google.com/rss/articles/CBMiiAFBVV95cUxQM2psaDlVM21pUHhXVTdtem4zYVNNX2JCLWNqalVjZHlPa0VCTy11ZEt0RU95U2hjU2YxazhUdWpLMmhCTTdSZG9nME1uNzZ3bXN4VGJQSVlGczRvMVFIYnBkT3hDOG1seGx2Z3hNY0hDM2otNTZYYmNQbGJ1Z0xUNnBibTczRGNK?oc=5"}, {"headline": "Domestic Violence Suspect Killed in Crash While Fleeing Plymouth, Massachusetts Police", "summary": "A domestic violence suspect died in a vehicle collision while attempting to evade Plymouth police during a traffic stop.", "insight": "High-speed pursuit outcomes and domestic violence response protocols will be scrutinized; if the suspect's death is attributed to police tactics, it may accelerate policy shifts around pursuit authorization and de-escalation training, affecting law enforcement operational procedures and municipal liability exposure across Massachusetts departments.", "source": "CBS News", "link": "https://news.google.com/rss/articles/CBMifkFVX3lxTE15NElCZWluOGgxZTF6SUxscWFhbzdsQmVFVGI4bW1majZCOWdxOW1rNTlyb3NvYzZ1S2VKaHVqa0hMOUNkcU9FeFZLaUFfRWtmVk4xQzZBV1QxcWF3TEJTdlYySWthZHF3Mk5QOVZVVHVnWm9YN2dpMkg4LXdCUQ?oc=5"}]}];
const edgeText = "Three structural arbitrage windows are closing simultaneously: (1) equity valuations assume Fed rate cuts that policy data no longer supports, creating re-rating risk; (2) Chinese AI cost advantage may rest partly on IP theft rather than innovation, making U.S. export controls more defensible but validating perpetual re-commoditization pressure; (3) tech layoffs signal AI capital intensity now exceeds hiring returns, concentrating moat-building and margin expansion among capital-rich incumbents, which favors mega-cap tech but undermines mid-market AI services. Allocators overweight in late-cycle equities and underweight in capital-constrained innovation bets face asymmetric downside if growth stalls without monetary accommodation.";
const tomorrowText = "";
const colors = {"Breaking News": "#CC0000", "Finance & Markets": "#CC0000", "Politics & Policy": "#7A1010", "AI & Technology": "#7A1010", "International": "#888888", "Culture & Sports": "#888888", "Boston": "#888888"};
const quotes = [{"ticker": "SPY", "label": "S&P 500", "price": "713.94", "change_pct": "0.7749"}, {"ticker": "IWB", "label": "Russell 1000", "price": "390.70", "change_pct": "0.7140"}, {"ticker": "IWM", "label": "Russell 2000", "price": "276.65", "change_pct": "0.4101"}, {"ticker": "EFA", "label": "MSCI EAFE", "price": "101.77", "change_pct": "0.5235"}, {"ticker": "FFR", "label": "MM Yield (avg)", "price": "3.64%", "change_pct": "0", "is_yield": true}];
const sectionOrder = ["Breaking News", "Finance & Markets", "Politics & Policy", "AI & Technology", "International", "Culture & Sports", "Boston"];
const noInsight = ["Breaking News"];

const TIER_BY_COLOR = { '#CC0000':1, '#7A1010':2, '#888888':3 };

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\"/g,'&quot;').replace(/'/g,'&#39;');
}

// Usage banner
if (usageInfo && usageInfo.cost_monthly_projected !== undefined) {
  const monthly = usageInfo.cost_monthly_projected;
  const cost = usageInfo.cost_this_call || 0;
  const tokens = usageInfo.total_tokens || 0;
  const budget = 10.0;
  const pct = Math.min(100, (monthly / budget) * 100);
  let barColor, status;
  if (monthly < 2)      { barColor = '#5599CC'; status = 'LOW'; }
  else if (monthly < 5) { barColor = '#888888'; status = 'MODERATE'; }
  else                  { barColor = '#CC0000'; status = 'HIGH'; }

  document.getElementById('usage').innerHTML =
    '<div class="usage-banner">' +
      '<div class="usage-row">' +
        '<span class="usage-label">API Usage</span>' +
        '<span class="usage-status" style="color:' + barColor + '">' + status + '</span>' +
      '</div>' +
      '<div class="usage-bar"><div class="usage-bar-fill" style="background:' + barColor + ';width:' + pct.toFixed(0) + '%"></div></div>' +
      '<div class="usage-details">$' + cost.toFixed(4) + ' this brief &middot; ' + tokens.toLocaleString() + ' tokens &middot; $' + monthly.toFixed(2) + '/mo projected &middot; $10.00 budget</div>' +
    '</div>';
}

// Market bar
const marketBar = document.getElementById('market-bar');
quotes.forEach(q => {
  const card = document.createElement('div');
  card.className = 'market-card';
  if (q.is_yield) {
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change" style="color:#888888">7d yield</div>';
  } else {
    const change = parseFloat(q.change_pct) || 0;
    const dir = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '&#9650;' : '&#9660;';
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change ' + dir + '">' + arrow + ' ' + Math.abs(change).toFixed(2) + '%</div>';
  }
  marketBar.appendChild(card);
});

// Build sections in fixed order
const sectionsMap = {};
rawSections.forEach(s => { sectionsMap[s.name] = s; });
const widgetsContainer = document.getElementById('widgets');

sectionOrder.forEach((secName, idx) => {
  const section = sectionsMap[secName] || { name: secName, stories: [] };
  const color = colors[secName] || '#888888';
  const tier = TIER_BY_COLOR[color] || 3;
  const stories = section.stories || [];
  const skipInsight = noInsight.includes(secName);
  const num = String(idx + 1).padStart(2, '0');

  let headlineBullets;
  if (stories.length > 0) {
    headlineBullets = '<ul class="widget-headlines">' +
      stories.map(s => '<li>' + escapeHtml(s.headline) + '</li>').join('') +
    '</ul>';
  } else {
    headlineBullets = '<ul class="widget-headlines"><li>No major stories this cycle</li></ul>';
  }

  const widget = document.createElement('div');
  widget.className = 'widget';
  widget.dataset.tier = tier;

  const header = document.createElement('div');
  header.className = 'widget-header';
  header.innerHTML =
    '<span class="widget-num">' + num + ' &middot;</span>' +
    '<div class="widget-info">' +
      '<div class="widget-title" style="color:' + color + '">' + escapeHtml(secName) + '</div>' +
      headlineBullets +
    '</div>' +
    '<span class="widget-count">' + stories.length + '</span>' +
    '<span class="widget-chevron">&#9656;</span>';
  header.addEventListener('click', () => widget.classList.toggle('active'));

  const body = document.createElement('div');
  body.className = 'widget-body';
  const storiesDiv = document.createElement('div');
  storiesDiv.className = 'widget-stories';

  stories.forEach(story => {
    const storyEl = document.createElement('div');
    storyEl.className = 'story';
    const headlineHtml = escapeHtml(story.headline);
    const sourceHtml = escapeHtml(story.source || '');
    const linkHtml = story.link
      ? '<a class="story-link" href="' + escapeHtml(story.link) + '" target="_blank" rel="noopener">Read source &#8594;</a>'
      : '';
    if (skipInsight) {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        linkHtml;
    } else {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span><span class="arrow">&#9656;</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        '<div class="story-details">' +
          '<div class="story-summary">' + escapeHtml(story.summary || '') + '</div>' +
          '<div class="story-insight">' +
            '<div class="insight-label">Claude Insight</div>' +
            escapeHtml(story.insight || '') +
          '</div>' +
          linkHtml +
        '</div>';
      storyEl.addEventListener('click', e => {
        if (e.target.tagName === 'A') return;
        e.stopPropagation();
        storyEl.classList.toggle('open');
      });
    }
    storiesDiv.appendChild(storyEl);
  });

  body.appendChild(storiesDiv);
  widget.appendChild(header);
  widget.appendChild(body);
  widgetsContainer.appendChild(widget);
});

if (edgeText) {
  document.getElementById('edge').innerHTML =
    '<div class="panel edge"><div class="panel-title">The Edge</div><p>' + escapeHtml(edgeText) + '</p></div>';
}

if (tomorrowText) {
  document.getElementById('tomorrow').innerHTML =
    '<div class="panel"><div class="panel-title">Tomorrow Watch</div><p>' + escapeHtml(tomorrowText) + '</p></div>';
}
</script>
</body>
</html>
