  .market-card .change { font-family:'DM Mono',monospace; font-size:11px; }

uT1lVVXVjR0tZMTVmT0lSSDlRbHFfTVQ1N0VpV3ZHbXpyNW8?oc=5"}]}, {"name": "International", "stories": [{"headline": "California Jet Fuel Supply Hits Three-Year Low; Middle East Conflict Constrains Global Oil", "summary": "California's jet fuel inventory drops to three-year lows as Middle East instability disrupts refinery operations and shipping logistics, tightening domestic aviation fuel supply.", "insight": "This creates a structural arbitrage: regional scarcity of jet fuel drives higher aviation costs and narrows operating margins for airlines with West Coast concentration; simultaneously, it signals to refineries that capacity expansion will earn supranormal returns, making refinery equities and energy infrastructure investment attractive despite broader commodity price uncertainty.", "source": "The Guardian", "link": "https://news.google.com/rss/articles/CBMigAFBVV95cUxQMkg4WUZ6MnNWaWhtWlhtZHprV0hOWEFZaXdJRVZTcDd2dkxBdUZ4bEYwQUt4eFdKUk9RekJaYXFIYjltZDM5d0FHd09zV2g5eEtRRXA3RExmNDlsVHl5X2t6Tmg2bU1ZSWg2b2RtcDZLZUgxZXRIMWhZcFhQU3V0WQ?oc=5"}, {"headline": "U.S. State Department Warns of Chinese AI Theft; DeepSeek and Others Targeted", "summary": "State Department issues global warning alleging Chinese entities including DeepSeek have stolen U.S. AI models and intellectual property through coordinated espionage operations.", "insight": "This escalates AI into explicit great-power competition terrain: if substantiated, it legitimizes export controls and threatens U.S. dominance in foundation models; for capital allocators, it justifies premium valuations for closed-loop AI infrastructure (domestic cloud, proprietary training data) and increases risk premium for open-source model plays with supply-chain exposure to Chinese actors.", "source": "CNBC", "link": "https://news.google.com/rss/articles/CBMigwFBVV95cUxQUjJhb2VhdlFXWTBCVUZQa3ZLQ2ZfTjJFUE9lbzRQNmJGYzhFZXJFLTJ3RWdDb0NPT1hQZkdwcW5wMjFfalUzSHNzdWM2dkpLa25vbG1XMXd2Tmo0SmpFZWUxMkU5U2hCcy1xY1RpNmpSMUxPLURFaTZYVVFSUWlSU1dvUdIBiAFBVV95cUxOQ0kwYjI1eHhaVjRuaGtiNGRldGRNLVFLRXpaQnc1MVhlMkZodm1iRlQ2U2pyWndzUnJwRW5pS0hHTVpWR1puM0Z2dnN2clg1V19IeWFVbkZTWnR0eTRuV3g3Nm9iVXVQMnRrUUlMVDNzc0VpX1d2QXZoZEJCZGFnNjF0djVaTTZk?oc=5"}, {"headline": "China Tightens Crypto Regulations Amid U.S.-China AI and Energy Competition Escalation", "summary": "China implements stricter crypto rules targeting offshore capital flows and decentralized finance, coinciding with economic war intensification over AI and oil.", "insight": "Capital controls via crypto restriction signal that China is concerned about capital flight during economic pressure; this is a leading indicator that Chinese leadership perceives structural disadvantage in AI competition and expects capital outflow acceleration\u2014making yuan weakness and offshore RMB volatility profitable bets for allocators with CNY exposure.", "source": "Cointribune", "link": "https://news.google.com/rss/articles/CBMivwFBVV95cUxOR1RFR3ZrcXFjeENaTkU4VkU1SXl1THV2V2dUTWlmV3dmMVRDbmFzZ1diN2k1WmZQVUdVcXFQdEZjSjJKd1p0TlMxUEJSV0FSMm9GQUd3ZWVPcGhuaXNITjJBNDBHd1ZjaUk4RjUxWFBoMU8wUkN2b2JRazQydE1mWUx2bGFlUUNKY0NzOHp3UnlPNnRxV1dCTjhKb0NZbEYtaUZVLVg5Sml3Y2hsUFRwczVObDdpd3J3VGQxTFM5TQ?oc=5"}]}, {"name": "Culture & Sports", "stories": [{"headline": "NBA Playoffs Begin; High-Stakes Competition Tests Team Depth and Star Power", "summary": "NBA playoff season opens with multiple matchups featuring championship contenders and emerging challengers, setting stage for postseason narrative development.", "insight": "Playoff performance data becomes real-time feedback on roster construction efficiency and coaching acumen; teams with high salary concentration in star players face elimination risk if those stars underperform, while balanced rosters show more stable performance, informing front-office capital allocation strategy for future drafts and trades.", "source": "NBA, Milwaukee Journal Sentinel", "link": "https://news.google.com/rss/articles/CBMizwFBVV95cUxNYmZoMXZSZnhONWtzOTU3N0swN1Bh ZHlPa0VCTy11ZEt0RU95U2hjU2YxazhUdWpLMmhCTTdSZG9nME1uNzZ3bXN4VGJQSVlGczRvMVFIYnBkT3hDOG1seGx2Z3hNY0hDM2otNTZYYmNQbGJ1Z0xUNnBibTczRGNK?oc=5"}, {"headline": "Domestic Violence Suspect Killed in Crash While Fleeing Plymouth Police", "summary": "A suspect evading Plymouth police in a domestic violence case died in a vehicle crash during pursuit, concluding high-speed chase.", "insight": "Police pursuit fatality raises liability exposure for municipalities and informs policy around chase protocols; this creates demand for fleet monitoring technology and autonomous braking systems that reduce pursuit-related deaths and associated municipal legal costs.", "source": "CBS News", "link": "https://news.google.com/rss/articles/CBMifkFVX3lxTE15NElCZWluOGgxZTF6SUxscWFhbzdsQmVFVGI4bW1majZCOWdxOW1rNTlyb3NvYzZ1S2VKaHVqa0hMOUNkcU9FeFZLaUFfRWtmVk4xQzZBV1QxcWF3TEJTdlYySWthZHF3Mk5QOVZVVHVnWm9YN2dpMkg4LXdCUQ?oc=5"}]}];
const edgeText = "AI layoffs are structural cost arbitrage (not cyclical), while China's crypto crackdowns signal capital flight fears during AI competition losses\u2014these converge to suggest U.S. tech maintains competitive moat through domestic automation efficiency, but China's policy tightening creates yuan weakness opportunity and redirects offshore capital toward hard assets, making commodity-linked infrastructure plays the cross-border arbitrage. Meanwhile, prediction market insider trading enforcement destroys regulatory gray-zone alpha, forcing allocators to migrate political-risk hedging from Polymarket-style contracts back to traditional derivatives where surveillance and pricing are mature.";
const tomorrowText = "";
const colors = {"Breaking News": "#CC0000", "Finance & Markets": "#CC0000", "Politics & Policy": "#7A1010", "AI & Technology": "#7A1010", "International": "#888888", "Culture & Sports": "#888888", "Boston": "#888888"};
const quotes = [{"ticker": "SPY", "label": "S&P 500", "price": "713.94", "change_pct": "0.7749"}, {"ticker": "IWB", "label": "Russell 1000", "price": "390.70", "change_pct": "0.7140"}, {"ticker": "IWM", "label": "Russell 2000", "price": "276.65", "change_pct": "0.4101"}, {"ticker": "EFA", "label": "MSCI EAFE", "price": "101.77", "change_pct": "0.5235"}, {"ticker": "FFR", "label": "MM Yield (avg)", "price": "3.64%", "change_pct": "0", "is_yield": true}];
const sectionOrder = ["Breaking News", "Finance & Markets", "Politics & Policy", "AI & Technology", "International", "Culture & Sports", "Boston"];
const noInsight = ["Breaking News"];

const TIER_BY_COLOR = { '#CC0000':1, '#7A1010':2, '#888888':3 };

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\"/g,'&quot;').replace(/'/g,'&#39;');
}

// Usage banner
if (usageInfo && usageInfo.cost_monthly_projected !== undefined) {
  const monthly = usageInfo.cost_monthly_projected;
  const cost = usageInfo.cost_this_call || 0;
  const tokens = usageInfo.total_tokens || 0;
  const budget = 10.0;
  const pct = Math.min(100, (monthly / budget) * 100);
  let barColor, status;
  if (monthly < 2)      { barColor = '#5599CC'; status = 'LOW'; }
  else if (monthly < 5) { barColor = '#888888'; status = 'MODERATE'; }
  else                  { barColor = '#CC0000'; status = 'HIGH'; }

  document.getElementById('usage').innerHTML =
    '<div class="usage-banner">' +
      '<div class="usage-row">' +
        '<span class="usage-label">API Usage</span>' +
        '<span class="usage-status" style="color:' + barColor + '">' + status + '</span>' +
      '</div>' +
      '<div class="usage-bar"><div class="usage-bar-fill" style="background:' + barColor + ';width:' + pct.toFixed(0) + '%"></div></div>' +
      '<div class="usage-details">$' + cost.toFixed(4) + ' this brief &middot; ' + tokens.toLocaleString() + ' tokens &middot; $' + monthly.toFixed(2) + '/mo projected &middot; $10.00 budget</div>' +
    '</div>';
}

// Market bar
const marketBar = document.getElementById('market-bar');
quotes.forEach(q => {
  const card = document.createElement('div');
  card.className = 'market-card';
  if (q.is_yield) {
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change" style="color:#888888">7d yield</div>';
  } else {
    const change = parseFloat(q.change_pct) || 0;
    const dir = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '&#9650;' : '&#9660;';
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change ' + dir + '">' + arrow + ' ' + Math.abs(change).toFixed(2) + '%</div>';
  }
  marketBar.appendChild(card);
});

// Build sections in fixed order
const sectionsMap = {};
rawSections.forEach(s => { sectionsMap[s.name] = s; });
const widgetsContainer = document.getElementById('widgets');

sectionOrder.forEach((secName, idx) => {
  const section = sectionsMap[secName] || { name: secName, stories: [] };
  const color = colors[secName] || '#888888';
  const tier = TIER_BY_COLOR[color] || 3;
  const stories = section.stories || [];
  const skipInsight = noInsight.includes(secName);
  const num = String(idx + 1).padStart(2, '0');

  let headlineBullets;
  if (stories.length > 0) {
    headlineBullets = '<ul class="widget-headlines">' +
      stories.map(s => '<li>' + escapeHtml(s.headline) + '</li>').join('') +
    '</ul>';
  } else {
    headlineBullets = '<ul class="widget-headlines"><li>No major stories this cycle</li></ul>';
  }

  const widget = document.createElement('div');
  widget.className = 'widget';
  widget.dataset.tier = tier;

  const header = document.createElement('div');
  header.className = 'widget-header';
  header.innerHTML =
    '<span class="widget-num">' + num + ' &middot;</span>' +
    '<div class="widget-info">' +
      '<div class="widget-title" style="color:' + color + '">' + escapeHtml(secName) + '</div>' +
      headlineBullets +
    '</div>' +
    '<span class="widget-count">' + stories.length + '</span>' +
    '<span class="widget-chevron">&#9656;</span>';
  header.addEventListener('click', () => widget.classList.toggle('active'));

  const body = document.createElement('div');
  body.className = 'widget-body';
  const storiesDiv = document.createElement('div');
  storiesDiv.className = 'widget-stories';

  stories.forEach(story => {
    const storyEl = document.createElement('div');
    storyEl.className = 'story';
    const headlineHtml = escapeHtml(story.headline);
    const sourceHtml = escapeHtml(story.source || '');
    const linkHtml = story.link
      ? '<a class="story-link" href="' + escapeHtml(story.link) + '" target="_blank" rel="noopener">Read source &#8594;</a>'
      : '';
    if (skipInsight) {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        linkHtml;
    } else {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span><span class="arrow">&#9656;</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        '<div class="story-details">' +
          '<div class="story-summary">' + escapeHtml(story.summary || '') + '</div>' +
          '<div class="story-insight">' +
            '<div class="insight-label">Claude Insight</div>' +
            escapeHtml(story.insight || '') +
          '</div>' +
          linkHtml +
        '</div>';
      storyEl.addEventListener('click', e => {
        if (e.target.tagName === 'A') return;
        e.stopPropagation();
        storyEl.classList.toggle('open');
      });
    }
    storiesDiv.appendChild(storyEl);
  });

  body.appendChild(storiesDiv);
  widget.appendChild(header);
  widget.appendChild(body);
  widgetsContainer.appendChild(widget);
});

if (edgeText) {
  document.getElementById('edge').innerHTML =
    '<div class="panel edge"><div class="panel-title">The Edge</div><p>' + escapeHtml(edgeText) + '</p></div>';
}

if (tomorrowText) {
  document.getElementById('tomorrow').innerHTML =
    '<div class="panel"><div class="panel-title">Tomorrow Watch</div><p>' + escapeHtml(tomorrowText) + '</p></div>';
}
</script>
</body>
</html>
