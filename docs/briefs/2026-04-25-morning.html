  a { color:inherit; text-decoration:none; }

  .topnav {

    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px;

  .container { max-width:760px; margin:0 auto; padding:32px 24px 96px; }

  .header { margin-bottom:36px; padding-bottom:24px; border-bottom:1px solid var(--border-dim); }
  .header .tag { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:4px; color:var(--apt-red); text-transform:uppercase; margin-bottom:10px; }
  .header h1 { font-family:'Syne',sans-serif; font-size:30px; font-weight:800; letter-spacing:0.5px; color:#FFFFFF; line-height:1.2; }
  .header .meta { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-top:10px; }

  .market-bar {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px;
    margin-bottom:32px;
  }
  .market-card {
    background:var(--bg-surface); border:1px solid var(--border-dim);
    padding:14px 12px; text-align:center;
  }
  .market-card .label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
  .market-card .price { font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:var(--text-primary); margin:6px 0 4px; }
  .market-card .change { font-family:'DM Mono',monospace; font-size:11px; }
  .market-card .change.up { color:#5599CC; }
  .market-card .change.down { color:var(--apt-red); }

  .usage-banner {
    background:var(--bg-deep); border:1px solid var(--border-dim);
    padding:12px 16px; margin-bottom:24px;
  }
  .usage-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .usage-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; }
  .usage-status { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:3px; font-weight:500; text-transform:uppercase; }

  .usage-details { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); }

  .widget {

  .widget.active { border-color:var(--text-muted); }

  .story-headline { font-family:'Syne',sans-serif; font-size:15px; font-weight:600; color:var(--text-primary); line-height:1.4; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }

  .story-source { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; margin-top:6px; }

  .story-insight { font-family:'DM Mono',monospace; font-size:12px; color:var(--text-body); line-height:1.65; padding:14px 16px; background:var(--bg-deep); border-left:2px solid var(--apt-red); }

  .story-link { display:inline-block; margin-top:12px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--apt-red); text-transform:uppercase; }

  .panel.edge { border-left:3px solid var(--apt-red); }

  .panel p { font-family:'DM Mono',monospace; font-size:13px; color:var(--text-body); line-height:1.7; }

    .header h1 { font-size:24px; }
    .widget-header { padding:16px 18px; gap:14px; }
    .widget-stories { padding:0 18px 18px; }

0 for groceries for family of 4", "summary": "American expat documents cost-of-living arbitrage by relocating to China, achieving housing and subsistence costs 60-80% below U.S. equivalents.", "insight": "This signals remapping of lifestyle purchasing power to lower-cost jurisdictions\u2014a structural trend that accelerates talent drain from high-cost tech hubs and creates brain-drain risk for innovation clusters if arbitrage becomes formalized through remote work policies.", "source": "CNBC", "link": "https://news.google.com/rss/articles/CBMixAFBVV95cUxOOUxQLTFTYkdqVllKbTdoQVVnQkMyTFFXVy1KcUMyQ0xsN2hBdnlGalBuVXExd29xZGFsWkUyYW5pUDJRdi1vQzl1dV9oWXR0WXRGRUVRallZcnBvdmVfYTBBSzl2Uzd5NUt4ZHFpNjR5T2pzUzhFQ29kMm04TGJ5UHowdkd3UENINTFLdnVmeXF5WkdMR0YzUlJRMEcxSUsySklDXzJDLXF3ellFaVlxODAxR2JLOGh3bWp1Vm9JdGR2d1NE0gHKAUFVX3lxTE9EMm1QM28wamE3TVI0N0tqS3hRWWNweDdEZVlReGtvR2FLR0dTMzNLYkV2OXNEOEZzSmV5OTNQNXJhbHRMeEFPZFJ2N0JDRzB6ejZ5dEkzM3BQbHZfWTZ0WHpLc002S2xGUVlJd2tISXhXTXBHbFA1Z3h5dnYwSUxOOFQ0ckhkQ1ZWNkpuLVB0MTItZy00T2Nka0hBY2IxaE9SQk40MVhUVEw1ZGloLUFtb0RDbGIzdHJrMXdIbkp1ZnNXR1E1TDR4UUE?oc=5"}]}, {"name": "Culture & Sports", "stories": [{"headline": "NBA playoff TV schedule, times, where to watch games today, stream", "summary": "NBA playoffs underway with scheduled games across multiple television networks and streaming platforms.", "insight": "Broadcast fragmentation across ESPN, ABC, TNT, and streaming services reflects media rights monetization expansion but creates viewership fragmentation that reduces aggregate audiences\u2014disadvantaging traditional networks and creating arbitrage for sports betting operators who aggregate distributed viewership data.", "source": "Milwaukee Journal Sentinel", "link": "https://news.google.com/rss/articles/CBMizwFBVV95cUxNYmZoMXZSZnhONWtzOTU3N0swN1BhNW5mNmh5TkNHVXk4czZ4X21WdGl2VmxyQ3MybE9pNzZLZU5RQ3hGZGxXRl9uNHpWd2R1Skg4SzlCV05WdGJhR3FZUWRqNGFCVnZCRFJBVTlfLWhXejNBWUZ4dWV6U3B1SE1TaW1RYk1OZnNGZjAweU9JaC1qYlVlRUhKTzdZdWdLVVl1enB2Tl9hWDZwUTU0aEdoVndzYnlfWHk0WlZrRXZhWDJ3djlpYmE5d2VoLV9leE0?oc=5"}, {"headline": "From 'Apex' to 'Marty Supreme,' 10 movies to stream right now", "summary": "Streaming platforms highlight curated film selections spanning indie to mainstream releases available across multiple SVOD services.", "insight": "Content curation fragmentation mirrors broadcast distribution\u2014viewers face increased decision friction across competing platforms, benefiting algorithmic recommendation engines and centralizing discovery through aggregation apps, while original content differentiation becomes harder to defend at scale.", "source": "USA Today", "link": "https://news.google.com/rss/articles/CBMi0wFBVV95cUxOY083Um1fb2psWjhXb2NNODlMNnlSNnlrdl9vNHB5dEUxQ2w1UkR6eWxEX1VXZGJHMW5EQ2xIa1ZHRkJ4RUZlbFJpdGpkWEZxOVozQUxrTXpvSGhXYzNveFVEYlhGQUFyMUF3UnNOb3ZJWU9JQ21PR3BNdG40dm42RWRvMjdNSnJIeUFVU1BWSURMWF9CQlpiMGNESjUtcnlqMndYSWp5UjdHRDlUZnpoZHRldHNvdlBCQm94VG9GLVlwY3czaHN2Z0ZaLUZuYTR5anBJ?oc=5"}]}, {"name": "Boston", "stories": [{"headline": "2 children found dead inside Wellesley, Massachusetts home during wellness check", "summary": "Investigation underway after two children discovered deceased in a Wellesley residence during a welfare check.", "insight": "This represents systemic gaps in child protective services and inter-agency coordination\u2014creating liability exposure for municipalities and potential policy pressure for expanded mandated reporter requirements and surveillance infrastructure.", "source": "CBS News, Boston 25 News", "link": "https://news.google.com/rss/articles/CBMiiAFBVV95cUxQM2psaDlVM21pUHhXVTdtem4zYVNNX2JCLWNqalVjZHlPa0VCTy11ZEt0RU95U2hjU2YxazhUdWpLMmhCTTdSZG9nME1uNzZ3bXN4VGJQSVlGczRvMVFIYnBkT3hDOG1seGx2Z3hNY0hDM2otNTZYYmNQbGJ1Z0xUNnBibTczRGNK?oc=5"}, {"headline": "Domestic violence suspect killed in crash while fleeing Plymouth, Massachusetts police", "summary": "A domestic violence suspect was fatally injured in a vehicle crash while attempting to evade police in Plymouth.", "insight": "High-speed pursuit protocols and outcome escalation reflect enforcement risk management\u2014creating liability cascades where initial intervention triggers terminal events, signaling pressure for de-escalation training and alternative response mechanisms.", "source": "CBS News", "link": "https://news.google.com/rss/articles/CBMifkFVX3lxTE15NElCZWluOGgxZTF6SUxscWFhbzdsQmVFVGI4bW1majZCOWdxOW1rNTlyb3NvYzZ1S2VKaHVqa0hMOUNkcU9FeFZLaUFfRWtmVk4xQzZBV1QxcWF3TEJTdlYySWthZHF3Mk5QOVZVVHVnWm9YN2dpMkg4LXdCUQ?oc=5"}]}];
const edgeText = "Fixed-income reallocation ahead of sustained higher rates creates a window where inflation-hedged hard assets (energy infrastructure, commodities logistics, Chinese battery capacity) compound advantage over purely software-defined valuations. Simultaneously, geographic arbitrage (cost-of-living escape to China, dockyard expansion in India) signals capital and talent flight from high-cost Western innovation hubs\u2014the structural setup that enables second-order moats for whoever controls terminal infrastructure in competing jurisdictions.";
const tomorrowText = "";
const colors = {"Breaking News": "#CC0000", "Finance & Markets": "#CC0000", "Politics & Policy": "#7A1010", "AI & Technology": "#7A1010", "International": "#888888", "Culture & Sports": "#888888", "Boston": "#888888"};
const quotes = [{"ticker": "SPY", "label": "S&P 500", "price": "713.94", "change_pct": "0.7749"}, {"ticker": "IWB", "label": "Russell 1000", "price": "390.70", "change_pct": "0.7140"}, {"ticker": "IWM", "label": "Russell 2000", "price": "276.65", "change_pct": "0.4101"}, {"ticker": "EFA", "label": "MSCI EAFE", "price": "101.77", "change_pct": "0.5235"}, {"ticker": "FFR", "label": "MM Yield (avg)", "price": "3.64%", "change_pct": "0", "is_yield": true}];
const sectionOrder = ["Breaking News", "Finance & Markets", "Politics & Policy", "AI & Technology", "International", "Culture & Sports", "Boston"];
const noInsight = ["Breaking News"];

const TIER_BY_COLOR = { '#CC0000':1, '#7A1010':2, '#888888':3 };

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\"/g,'&quot;').replace(/'/g,'&#39;');
}

// Usage banner
if (usageInfo && usageInfo.cost_monthly_projected !== undefined) {
  const monthly = usageInfo.cost_monthly_projected;
  const cost = usageInfo.cost_this_call || 0;
  const tokens = usageInfo.total_tokens || 0;
  const budget = 10.0;
  const pct = Math.min(100, (monthly / budget) * 100);
  let barColor, status;
  if (monthly < 2)      { barColor = '#5599CC'; status = 'LOW'; }
  else if (monthly < 5) { barColor = '#888888'; status = 'MODERATE'; }
  else                  { barColor = '#CC0000'; status = 'HIGH'; }

  document.getElementById('usage').innerHTML =
    '<div class="usage-banner">' +
      '<div class="usage-row">' +
        '<span class="usage-label">API Usage</span>' +
        '<span class="usage-status" style="color:' + barColor + '">' + status + '</span>' +
      '</div>' +
      '<div class="usage-bar"><div class="usage-bar-fill" style="background:' + barColor + ';width:' + pct.toFixed(0) + '%"></div></div>' +
      '<div class="usage-details">$' + cost.toFixed(4) + ' this brief &middot; ' + tokens.toLocaleString() + ' tokens &middot; $' + monthly.toFixed(2) + '/mo projected &middot; $10.00 budget</div>' +
    '</div>';
}

// Market bar
const marketBar = document.getElementById('market-bar');
quotes.forEach(q => {
  const card = document.createElement('div');
  card.className = 'market-card';
  if (q.is_yield) {
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change" style="color:#888888">7d yield</div>';
  } else {
    const change = parseFloat(q.change_pct) || 0;
    const dir = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '&#9650;' : '&#9660;';
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change ' + dir + '">' + arrow + ' ' + Math.abs(change).toFixed(2) + '%</div>';
  }
  marketBar.appendChild(card);
});

// Build sections in fixed order
const sectionsMap = {};
rawSections.forEach(s => { sectionsMap[s.name] = s; });
const widgetsContainer = document.getElementById('widgets');

sectionOrder.forEach((secName, idx) => {
  const section = sectionsMap[secName] || { name: secName, stories: [] };
  const color = colors[secName] || '#888888';
  const tier = TIER_BY_COLOR[color] || 3;
  const stories = section.stories || [];
  const skipInsight = noInsight.includes(secName);
  const num = String(idx + 1).padStart(2, '0');

  let headlineBullets;
  if (stories.length > 0) {
    headlineBullets = '<ul class="widget-headlines">' +
      stories.map(s => '<li>' + escapeHtml(s.headline) + '</li>').join('') +
    '</ul>';
  } else {
    headlineBullets = '<ul class="widget-headlines"><li>No major stories this cycle</li></ul>';
  }

  const widget = document.createElement('div');
  widget.className = 'widget';
  widget.dataset.tier = tier;

  const header = document.createElement('div');
  header.className = 'widget-header';
  header.innerHTML =
    '<span class="widget-num">' + num + ' &middot;</span>' +
    '<div class="widget-info">' +
      '<div class="widget-title" style="color:' + color + '">' + escapeHtml(secName) + '</div>' +
      headlineBullets +
    '</div>' +
    '<span class="widget-count">' + stories.length + '</span>' +
    '<span class="widget-chevron">&#9656;</span>';
  header.addEventListener('click', () => widget.classList.toggle('active'));

  const body = document.createElement('div');
  body.className = 'widget-body';
  const storiesDiv = document.createElement('div');
  storiesDiv.className = 'widget-stories';

  stories.forEach(story => {
    const storyEl = document.createElement('div');
    storyEl.className = 'story';
    const headlineHtml = escapeHtml(story.headline);
    const sourceHtml = escapeHtml(story.source || '');
    const linkHtml = story.link
      ? '<a class="story-link" href="' + escapeHtml(story.link) + '" target="_blank" rel="noopener">Read source &#8594;</a>'
      : '';
    if (skipInsight) {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        linkHtml;
    } else {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span><span class="arrow">&#9656;</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        '<div class="story-details">' +
          '<div class="story-summary">' + escapeHtml(story.summary || '') + '</div>' +
          '<div class="story-insight">' +
            '<div class="insight-label">Claude Insight</div>' +
            escapeHtml(story.insight || '') +
          '</div>' +
          linkHtml +
        '</div>';
      storyEl.addEventListener('click', e => {
        if (e.target.tagName === 'A') return;
        e.stopPropagation();
        storyEl.classList.toggle('open');
      });
    }
    storiesDiv.appendChild(storyEl);
  });

  body.appendChild(storiesDiv);
  widget.appendChild(header);
  widget.appendChild(body);
  widgetsContainer.appendChild(widget);
});

if (edgeText) {
  document.getElementById('edge').innerHTML =
    '<div class="panel edge"><div class="panel-title">The Edge</div><p>' + escapeHtml(edgeText) + '</p></div>';
}

if (tomorrowText) {
  document.getElementById('tomorrow').innerHTML =
    '<div class="panel"><div class="panel-title">Tomorrow Watch</div><p>' + escapeHtml(tomorrowText) + '</p></div>';
}
</script>
</body>
</html>
