ings.", "source": "The New York Times", "link": "https://news.google.com/rss/articles/CBMirAFBVV95cUxPcUVsUFhURm5ZTE96eVdXMzBMQ1BVcGg3R0NJdU1qVGw4S05pa05iX2Q5UUUtenJKYUI5UzZMMUFKVFVpQlFLX2M2N21IV1ltTGdSV0k0VDVrQWNqMjl6VkZYWkRudzF1ZF9KMkRhVkdSX0FPdlFyYzJJYUFYeXRnZHZWYWtrRWUtYlRQdXkzX1I4OGE3QnY1NnZVN0NBV2RvcE5nSFI4TzNING9p?oc=5"}]}, {"name": "AI & Technology", "stories": [{"headline": "Meta Acquires Assured Robot Intelligence, Escalating Humanoid AI Competition", "summary": "Meta purchased robotics AI startup ARI to deepen its position in embodied AI and humanoid robotics, joining OpenAI, Figure, and Tesla in the race to build scalable autonomous systems.", "insight": "This is capital consolidation in a high-margin, moat-building domain: embodied AI requires integrated hardware-software stacks that are defensible against commoditization; Meta's acquisition of ARI signals a shift from compute-centric AI toward physical-world execution advantages, creating asymmetric returns for companies with manufacturing and real-world deployment scale.", "source": "Dataconomy, thelec.net", "link": "https://news.google.com/rss/articles/CBMimwFBVV95cUxPZWZ1ZmIzU0JjUG9HZWdiNHpFM2d4Ym5xc3dMZk42S3pYU3dVSW9TYmVJVVNlMGMtVm5CTVp4OC1nSElYSkFMOUNXbWswSXU3TjFUR1JQTTJkWFB1WEotR05vUldJY3dFR3plektWNTVWT0Y5MHcxZnRJd0hkN09jTVNnNE1iZXgzekk3Q0dnVUp1UGE2RzNBTlhONA?oc=5"}, {"headline": "The Growing Divide of Tech Winners and Losers: AI Consolidation Accelerates", "summary": "Capital and talent are concentrating at mega-cap tech firms with scale advantages in AI training and deployment, while mid-size and smaller platforms face margin compression and talent flight.", "insight": "This is a bifurcation in AI returns: companies with trillion-dollar market caps and access to proprietary data can absorb AI capex and burn cash for years; startups and smaller platforms must monetize immediately or face extinction, creating a three-year window where Series B and C rounds collapse and only mega-cap acquirers can ndow where companies can still arbitrage dual-zone operations before irreversible capital reallocation.", "source": "Information Technology and Innovation Foundation (ITIF)", "link": "https://news.google.com/rss/articles/CBMinAFBVV95cUxPTDZKNFZJRWd1V05UZGNwZGVBZnlEUVRxNVJHUF91Uk9CWFNpbkZmcXFJcXhYQVZjeUJ3Zks1SlppakRNUHFIOXJXUFNGTlM3cThNU3BMUkpteE5QWXg2b09GUk9BaHRzV3lCWW9TZVctMkE0Rzl1NWU5YTljb0IwMWdjRHRhTkhsbTBJbWJQcVV0ejQ4WTR0U2tlNWc?oc=5"}]}, {"name": "Culture & Sports", "stories": [{"headline": "Consumers Prefer AI Music Until Told It's AI: Perception Determines Value", "summary": "Blind testing shows audiences rank AI-generated music equal to human-composed tracks, but preference collapses once AI provenance is disclosed, revealing quality-independent brand bias.", "insight": "This is a market efficiency failure with pricing implications: if AI music quality is indistinguishable but worth 60-70% less due to perceived authenticity discount, creators have a two-year window to monetize AI-generated content before sentiment locks in a permanent discount; music streaming royalty models will bifurcate between AI and human tracks, compressing creator margins.", "source": "promarket.org", "link": "https://news.google.com/rss/articles/CBMikgFBVV95cUxPNDNBVVFiWWQwbWQ3aThoNnYyUXRIdW85d3M2MnlaYk96SlFKcFdMMjFKdEZDUHlBR0NlLWRUYl9ZejctZ3NmY0JHbDl1ZGNhS3dZdkd2SFZybjBZa0huZEhfODZHcGFNcmhadFc5dXhtMDBXRl9jYzU4dmNEXzc5cHU2aGJsUzRWTE5MSUtwNlpyUQ?oc=5"}, {"headline": "NBA Playoff Game 7s Produce Clear Winners and Losers in Ratings and Roster Value", "summary": "Detroit Pistons and Cleveland Cavaliers advanced past Game 7s, with playoff performance generating measurable impacts on team valuations and player stock.", "insight": "This is microeconomics of athletic optionality: Game 7 winners capture 30-40% valuation gains from extended playoff runs versus first-round exits, creating perverse incentives for playoff seeding and playoff revenue share structures that benefit small-market teams with worse regular-season records.", "source": "USA Today", "link": "https://news.google.com/rss/articles/CBMixwFBVV95cUxOWGZmMUVPcWRkQWd1X3FlSFkyV0huUktxaVMtTHl4NUZJVEgwS1BRdFBybXZqa2NfTlMtdFpHd2N2ZldwRm9BZ0o2V0NvYkJZRjg0SXU0UTFsTTdXMEpfTU1CWDZXSTVzcnNxSXhOeF9ZN3RXckpuV2dCbTlJU01MVlFKUXJXOFNhcmV3MVRrRV9mNVptN20zekVwVm5LU2ZVQ2stYlRkQm44dUpaTl8yWWJuVE1hR2drZmt5QzFLRzlXWG9GeUtN?oc=5"}]}, {"name": "Boston", "stories": [{"headline": "Last Boston Market Location in Massachusetts Closes: Chain Decline Accelerates", "summary": "The final Boston Market restaurant in Massachusetts shut down, marking the end of the once-dominant casual rotisserie chicken chain that peaked with hundreds of locations.", "insight": "This is legacy brand erosion under labor and food cost inflation: Boston Market's operating model of high-volume, low-margin prepared food became unviable as minimum wage rose and supply chains fragmented; the brand failed to pivot to ghost kitchens or delivery-focused formats, ceding share to meal-prep and fast-casual competitors, a cautionary tale for mid-tier QSR operators facing margin compression.", "source": "The Boston Globe", "link": "https://news.google.com/rss/articles/CBMihwFBVV95cUxNUGVRZW10cmdkbGZrX0Y1SnVYNko0SUNEcERsbTRORXoxcS1qX1JValF0eXFvV0dJUEtHRzViLW5mY0tvNnBSX0RETkN6T0tFMzJ0YXFrMFhCeFRkOXdPNFpQTXQ4V29reWVxVU44TElIMVNkSGR3UDJnZkEydXAyNXpSNzlkYUE?oc=5"}, {"headline": "Two Arrested in Armed Home Invasion in Saugus, Massachusetts", "summary": "Law enforcement arrested two suspects connected to an armed residential home invasion in Saugus, with investigation ongoing.", "insight": "This is a neighborhood-level crime signal with property insurance implications: armed home invasions in suburban Massachusetts indicate either organized retail theft fencing or opioid-driven opportunistic crime; if part of a wave, insurers will reprice homeowners policies in affected zip codes and raise deductibles for robbery coverage.", "source": "WCVB", "link": "https://news.google.com/rss/articles/CBMieEFVX3lxTE1lekZBOTNSc3Frblp3bkRIX0luX0w0Vk1VbUJpSEx0QVQ3Z2pLcHZmV0N4MEFBa2dSeUl5U2x0ZTMzYXAxTTJ4eFgzcmJvWEw4a3NPMGs4TS1LNGZMYm9uWG9YZ1ZyU2lyNjdYQTBVNF95aHFwbk1hMg?oc=5"}]}];
const edgeText = "The Fed's hawkish pivot and Powell's rate-hold signal are colliding with geopolitical supply disruption and equity valuations priced for growth: this creates a 60-90 day window where allocators can arbitrage commodity upside (energy underpricing disruption) against equity downside (earnings revisions from input cost inflation and margin compression in Asia manufacturing), while private credit demand shifts to Asia where yield arbitrage and supply scarcity create 300+ basis points of excess return versus developed markets.";
const tomorrowText = "";
const colors = {"Breaking News": "#CC0000", "Finance & Markets": "#CC0000", "Politics & Policy": "#7A1010", "AI & Technology": "#7A1010", "International": "#888888", "Culture & Sports": "#888888", "Boston": "#888888"};
const quotes = [{"ticker": "SPY", "label": "S&P 500", "price": "720.65", "change_pct": "0.2769"}, {"ticker": "IWB", "label": "Russell 1000", "price": "393.89", "change_pct": "0.2698"}, {"ticker": "IWM", "label": "Russell 2000", "price": "279.28", "change_pct": "0.4713"}, {"ticker": "EFA", "label": "MSCI EAFE", "price": "102.10", "change_pct": "-0.2150"}, {"ticker": "FFR", "label": "MM Yield (avg)", "price": "3.64%", "change_pct": "0", "is_yield": true}];
const sectionOrder = ["Breaking News", "Finance & Markets", "Politics & Policy", "AI & Technology", "International", "Culture & Sports", "Boston"];
const noInsight = ["Breaking News"];

const TIER_BY_COLOR = { '#CC0000':1, '#7A1010':2, '#888888':3 };

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\"/g,'&quot;').replace(/'/g,'&#39;');
}

// Usage banner
if (usageInfo && usageInfo.cost_monthly_projected !== undefined) {
  const monthly = usageInfo.cost_monthly_projected;
  const cost = usageInfo.cost_this_call || 0;
  const tokens = usageInfo.total_tokens || 0;
  const budget = 10.0;
  const pct = Math.min(100, (monthly / budget) * 100);
  let barColor, status;
  if (monthly < 2)      { barColor = '#5599CC'; status = 'LOW'; }
  else if (monthly < 5) { barColor = '#888888'; status = 'MODERATE'; }
  else                  { barColor = '#CC0000'; status = 'HIGH'; }

  document.getElementById('usage').innerHTML =
    '<div class="usage-banner">' +
      '<div class="usage-row">' +
        '<span class="usage-label">API Usage</span>' +
        '<span class="usage-status" style="color:' + barColor + '">' + status + '</span>' +
      '</div>' +
      '<div class="usage-bar"><div class="usage-bar-fill" style="background:' + barColor + ';width:' + pct.toFixed(0) + '%"></div></div>' +
      '<div class="usage-details">$' + cost.toFixed(4) + ' this brief &middot; ' + tokens.toLocaleString() + ' tokens &middot; $' + monthly.toFixed(2) + '/mo projected &middot; $10.00 budget</div>' +
    '</div>';
}

// Market bar
const marketBar = document.getElementById('market-bar');
quotes.forEach(q => {
  const card = document.createElement('div');
  card.className = 'market-card';
  if (q.is_yield) {
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change" style="color:#888888">7d yield</div>';
  } else {
    const change = parseFloat(q.change_pct) || 0;
    const dir = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '&#9650;' : '&#9660;';
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change ' + dir + '">' + arrow + ' ' + Math.abs(change).toFixed(2) + '%</div>';
  }
  marketBar.appendChild(card);
});

// Build sections in fixed order
const sectionsMap = {};
rawSections.forEach(s => { sectionsMap[s.name] = s; });
const widgetsContainer = document.getElementById('widgets');

sectionOrder.forEach((secName, idx) => {
  const section = sectionsMap[secName] || { name: secName, stories: [] };
  const color = colors[secName] || '#888888';
  const tier = TIER_BY_COLOR[color] || 3;
  const stories = section.stories || [];
  const skipInsight = noInsight.includes(secName);
  const num = String(idx + 1).padStart(2, '0');

  let headlineBullets;
  if (stories.length > 0) {
    headlineBullets = '<ul class="widget-headlines">' +
      stories.map(s => '<li>' + escapeHtml(s.headline) + '</li>').join('') +
    '</ul>';
  } else {
    headlineBullets = '<ul class="widget-headlines"><li>No major stories this cycle</li></ul>';
  }

  const widget = document.createElement('div');
  widget.className = 'widget';
  widget.dataset.tier = tier;

  const header = document.createElement('div');
  header.className = 'widget-header';
  header.innerHTML =
    '<span class="widget-num">' + num + ' &middot;</span>' +
    '<div class="widget-info">' +
      '<div class="widget-title" style="color:' + color + '">' + escapeHtml(secName) + '</div>' +
      headlineBullets +
    '</div>' +
    '<span class="widget-count">' + stories.length + '</span>' +
    '<span class="widget-chevron">&#9656;</span>';
  header.addEventListener('click', () => widget.classList.toggle('active'));

  const body = document.createElement('div');
  body.className = 'widget-body';
  const storiesDiv = document.createElement('div');
  storiesDiv.className = 'widget-stories';

  stories.forEach(story => {
    const storyEl = document.createElement('div');
    storyEl.className = 'story';
    const headlineHtml = escapeHtml(story.headline);
    const sourceHtml = escapeHtml(story.source || '');
    const linkHtml = story.link
      ? '<a class="story-link" href="' + escapeHtml(story.link) + '" target="_blank" rel="noopener">Read source &#8594;</a>'
      : '';
    if (skipInsight) {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        linkHtml;
    } else {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span><span class="arrow">&#9656;</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        '<div class="story-details">' +
          '<div class="story-summary">' + escapeHtml(story.summary || '') + '</div>' +
          '<div class="story-insight">' +
            '<div class="insight-label">Apterreon Insight</div>' +
            escapeHtml(story.insight || '') +
          '</div>' +
          linkHtml +
        '</div>';
      storyEl.addEventListener('click', e => {
        if (e.target.tagName === 'A') return;
        e.stopPropagation();
        storyEl.classList.toggle('open');
      });
    }
    storiesDiv.appendChild(storyEl);
  });

  body.appendChild(storiesDiv);
  widget.appendChild(header);
  widget.appendChild(body);
  widgetsContainer.appendChild(widget);
});

if (edgeText) {
  document.getElementById('edge').innerHTML =
    '<div class="panel edge"><div class="panel-title">The Edge</div><p>' + escapeHtml(edgeText) + '</p></div>';
}

if (tomorrowText) {
  document.getElementById('tomorrow').innerHTML =
    '<div class="panel"><div class="panel-title">Tomorrow Watch</div><p>' + escapeHtml(tomorrowText) + '</p></div>';
}
</script>
</body>
</html>
