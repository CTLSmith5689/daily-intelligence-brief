und.", "insight": "This marks a structural shift in AI economics: infrastructure capex now exceeds software and talent spend, meaning only firms with access to capital markets and monopoly cash flows (Google, Amazon, Microsoft, Apple) can play. Meta's underperformance relative to peers signals that consumer-facing AI monetization is lagging infrastructure commitments. The winner's moat is capital velocity and utilization rates, not model novelty. Expect aggressive consolidation of smaller AI vendors into mega-cap platforms.", "source": "Bloomberg, Financial Times, Yahoo Finance", "link": "https://news.google.com/rss/articles/CBMirgFBVV95cUxOMG9ONnJTam9IbnJ2bmwtX0NiZkdXeFNhRW8zY3BjUnZTUDEteDZVLTVTNEtncmNjY3FIa0xxclRwSFBvUW5YbmMyeXNhdV85TjBQUEtBaWRFTkpiSUtjaldCNzhMSTM4cWJmMmZSSUtQeDFuT0dTZVVCT2wzclNmRXVtbEpaajJhU09JZHJTVFpTdV9aNXRSVUVkOTNoRm5RRjA0YUtTNTNiUDR6SXc?oc=5"}]}, {"name": "International", "stories": [{"headline": "Oil prices hit wartime high on Iran standoff as Trump signals continued Hormuz pressure strategy", "summary": "Crude prices surged to their highest levels since 2022 amid escalating Iran tensions and Trump's signals of sustained blockade pressure on the Strait of Hormuz, with no near-term diplomatic resolution visible.", "insight": "Oil's trajectory is now decoupled from demand fundamentals and locked into geopolitical brinksmanship. At $100+ WTI, demand destruction becomes inevitable in discretionary sectors, but energy stocks and energy-intensive commodity chains experience margin compression asymmetrically. Winners are firms with pricing power and low energy intensity; losers are leveraged transporters and discretionary manufacturers. This creates a persistent stagflation vector that central banks cannot solve with conventional policy.", "source": "BBC, The New York Times, Reuters", "link": "https://news.google.com/rss/articles/CBMiWkFVX3lxTFBsbzF3QzZBT2o2cXFBNG5fNGpwYlJwVnhndmg0ZE9DV1hSaTJvXzdsRjVNTEt4cmZqNVJDZjJQamVZYVZFWkc3bE9aS0R6S29VYVFqSy1FU3pUZw?oc=5"}, {"headline": "Israel's economy and financial markets boom despite Middle East conflict as war becomes economically normalized", "summary": "Israeli equity and bond markets are performing strongly, indicating investors view the extended conflict as economically manageable and potentially supportive of defense spending and regional positioning.", "insight": "This reveals a market structure where geopolitical risk is now pricing into asset returns rather than creating flight risk. Equities in conflict zones with strong state capacity and U.S. backing outperform, while peripheral regions underperform. For allocators, this suggests the risk premium for Israeli and allied assets is compressing while global demand destruction risks remain underpriced.", "source": "CNBC", "link": "https://news.google.com/rss/articles/CBMiqgFBVV95cUxQNHY3Mkpyb19NOTY2Vkw5bE1vdkRvVGhCZVhlOGF0SGFuT1Q1LUJkS3gya1N2TEUwbzJpVnJzektVLWhzTHVrQmh5UGtFY3BpN0hkaVczZjdXWm5EZ0hGOFQ1cVc1N01YNmltU0NFcmJXRm5nOFFCRGRnNER5VzhPbW1ScWtJR0c1TmRGOVpCUkhhdlFhbmR1WE9rbk1sejAzSUJlNnhkLXpNZw?oc=5"}, {"headline": "China's factory activity holds up despite Middle East disruptions, signaling domestic demand resilience", "summary": "Manufacturing surveys show Chinese industrial production remaining stable even as global supply chain stress mounts from the Iran conflict, suggesting domestic consumption and state stimulus are offsetting external headwinds.", "insight": "This indicates China is decoupling from global demand shocks through internal consumption support and local supply chain substitution. For allocators, this means China-focused and China-exported goods remain defensive while globally exposed manufacturers face margin pressure. The long-term implication is further regionalization of supply chains and reduced role for China as global growth engine relative to as domestic demand stabilizer.", "source": "WSJ, CGTN", "link": "https://news.google.com/rss/articles/CBMimAFBVV95cUxPRlRGZ3NSV05neDlhbjFfZ0NIcWRPRjlXY3JsX3hNek9wNnNfR3g0OERTRmpUaU1ZY2hfTXhkZHR0TDVjS0swYmxidm9GV2xlX05UNHhXXzc2aGxIcU53YkxNd1lWU0ZnOEExcXd4eEdGSFhxak5ibXYwcWt0LWR6OTQ4djI4UzNKRXllbkVOcFhpSngtdDdCUg?oc=5"}]}, {"name": "Culture & Sports", "stories": [{"headline": "Billboard Women in Music 2026 celebrates emerging artists in fragmented, algorithm-driven music landscape", "summary": "Billboard's annual showcase highlighted diverse emerging female artists, reflecting continued democratization of music discovery through streaming platforms and direct fan engagement.", "insight": "The music industry's winner-take-all structure is shifting: traditional label power is eroding as artists can build audiences directly via TikTok and streaming. For capital allocators, this means music IP valuations depend increasingly on social proof metrics rather than radio airplay or traditional promotion. Expect consolidation around data-driven talent discovery platforms rather than talent agencies.", "source": "Billboard", "link": "https://news.google.com/rss/articles/CBMikgFBVV95cUxOMFJxdmxrZW41Ni1iREMzVzVVTEdDdUZac2ZOYXBrX1pUb3R3U3ZqSm5SQ2RfSFIwWl9ZZjIwbkNvSE9sc0J1akpyTkJuOVVPRi16QkFFeTlVM3VEdDJETHJxLUJYMGNRZHBtRXNkRGhxYnFkcEdWMkkzYXpVWFRuNFh3V2FWTUtQQlFGZW41Q0lEUQ?oc=5"}, {"headline": "Knicks face Hawks in Game 6 playoff elimination match as Eastern Conference bracket tightens", "summary": "The Knicks and Hawks are locked in a tense playoff series with elimination at stake, setting up a high-leverage Game 6 that will determine Eastern Conference positioning.", "insight": "Sports broadcasting and gambling flows are tied to playoff intensity and series length: tighter matchups extend media rights value and sportsbook handle. For Disney, ESPN, and betting platforms, extended series outcomes drive higher ad CPMs and commission volumes. This is a minor but measurable revenue tail for media and fintech firms.", "source": "Bergen Record", "link": "https://news.google.com/rss/articles/CBMixAFBVV95cUxONmF0OXpZQlhrbzUtWWx2NUhhOWhHMGs0MHJyclI3X2pnNllYUXY4VkZqSGw3SFd0VkF3dVB1ekoyNk10YUFCazRQRk9WbkdiQ0Z2VWwtZGo3SzN5SlVyRlU5aUVqWF9OWVphbkNZVlV6SHdKb3AxNXZiYnl0WThBV2xacHk0VzFCM2ZBQ1Q2TlhTZVRhSFVMNVBvemdSbndyUC1GWnVBYnZlNmpRc0o2TFBRTlRMMXVuVk9Yb0NMdE0xR3JM?oc=5"}]}, {"name": "Boston", "stories": [{"headline": "Tractor-trailer rollover on Mass. Pike in Weston creates major backup, prompts traffic diversions", "summary": "A tractor-trailer rolled over on the Massachusetts Turnpike in Weston near the Route 128 ramp, causing extended eastbound delays and emergency response.", "insight": "Route 128 and Mass. Pike disruptions cascade through Boston metro logistics and supply chain timing. Firms with just-in-time delivery and port-dependent supply chains face hours of latency cost. Elevated accident frequency on stressed corridors incentivizes infrastructure capital reallocation toward rail and air logistics alternatives in the region.", "source": "NBC Boston, Boston 25 News", "link": "https://news.google.com/rss/articles/CBMipAFBVV95cUxNT1A3aUd1VXM3cVJHUmVzc3dqcHBpa3VaV0lVVVhrTllEMmwzNDRrZTJ1OTVXeUgwM2p1RDZ4X2RzbDI0a0RBSVJMUkpMUWZIVFFJb3JvbEkza1JHc1AyYl9qX1BPTzdQbUF1S0hCd1RFbGRoMmJhbWJHd1UyLTlNZDJJSHd5eGUwOGRxOXFid3B5VndrOE9ETWdrZWhPUFlwTkZLQdIBrAFBVV95cUxNZnJkdi0yc1E2aGxjUHNuM3FoNTE5Y25uTndaRnFMY29selZyMG9vMU9CdFVlRXNaTF80N3gzZExldEpjYVl6SmtHWmxmOWJRajZTaURnLUktNmFWQ2lHUUdBWVZmSUJ5Y3BYVUFkaElURXhfTjlKSVlGSGVxZEZrczNWb01Jb0dMRFZRUHluUDhPa2tvQ2pJYV9WNTA2WE4tU2lORVhWazI4MUtp?oc=5"}, {"headline": "18-year-old charged with arson in Haverhill mill fire after igniting yarn with aerosol deodorant", "summary": "An 18-year-old woman was arrested and charged in connection with a major fire at a Haverhill textile mill after investigators determined she ignited yarn with aerosol spray deodorant.", "insight": "This reflects broader structural decline in Massachusetts textile manufacturing: aging mill infrastructure remains underutilized and vulnerable to criminal activity or neglect. Remediation and repurposing of abandoned industrial sites creates long-tail liability for municipalities and surrounding property values. For real estate investors, Massachusetts mill conversions carry elevated regulatory and community risk that pricing may not adequately reflect.", "source": "CBS News", "link": "https://news.google.com/rss/articles/CBMiggFBVV95cUxQZlF5cG1oQUVFU2ZCOGs1bDdoV2tzM3Y1OEFEYThsVWZBTU53U2tiSG1NLTR2ekZvUTd6UlIwZFFMeDVtc05VYWx4ckhKbm9iY2ZKUHppd2w3WEpqMWluUnBmV21xUnNKY1hJZVY0X0x4UDJBZlFKUlF2X2pVM3BpeGpn?oc=5"}]}];
const edgeText = "The converging macro picture is stagflation from exogenous oil shock colliding with structural policy-driven capital concentration in AI, defense, and semiconductor manufacturing. Allocators face a bifurcating market: policy-blessed incumbents with domestic supply chains and AI regulatory capture are pricing in permanent moats, while globally exposed and low-margin operators face margin compression and demand destruction. The real arbitrage window is in firms embedded in the state-led industrial policy consensus before the policy certainty spreads to equity pricing.";
const tomorrowText = "";
const colors = {"Breaking News": "#CC0000", "Finance & Markets": "#CC0000", "Politics & Policy": "#7A1010", "AI & Technology": "#7A1010", "International": "#888888", "Culture & Sports": "#888888", "Boston": "#888888"};
const quotes = [{"ticker": "SPY", "label": "S&P 500", "price": "711.58", "change_pct": "-0.0155"}, {"ticker": "IWB", "label": "Russell 1000", "price": "388.87", "change_pct": "-0.0514"}, {"ticker": "IWM", "label": "Russell 2000", "price": "272.08", "change_pct": "-0.6681"}, {"ticker": "EFA", "label": "MSCI EAFE", "price": "99.93", "change_pct": "-1.0202"}, {"ticker": "FFR", "label": "MM Yield (avg)", "price": "3.64%", "change_pct": "0", "is_yield": true}];
const sectionOrder = ["Breaking News", "Finance & Markets", "Politics & Policy", "AI & Technology", "International", "Culture & Sports", "Boston"];
const noInsight = ["Breaking News"];

const TIER_BY_COLOR = { '#CC0000':1, '#7A1010':2, '#888888':3 };

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\"/g,'&quot;').replace(/'/g,'&#39;');
}

// Usage banner
if (usageInfo && usageInfo.cost_monthly_projected !== undefined) {
  const monthly = usageInfo.cost_monthly_projected;
  const cost = usageInfo.cost_this_call || 0;
  const tokens = usageInfo.total_tokens || 0;
  const budget = 10.0;
  const pct = Math.min(100, (monthly / budget) * 100);
  let barColor, status;
  if (monthly < 2)      { barColor = '#5599CC'; status = 'LOW'; }
  else if (monthly < 5) { barColor = '#888888'; status = 'MODERATE'; }
  else                  { barColor = '#CC0000'; status = 'HIGH'; }

  document.getElementById('usage').innerHTML =
    '<div class="usage-banner">' +
      '<div class="usage-row">' +
        '<span class="usage-label">API Usage</span>' +
        '<span class="usage-status" style="color:' + barColor + '">' + status + '</span>' +
      '</div>' +
      '<div class="usage-bar"><div class="usage-bar-fill" style="background:' + barColor + ';width:' + pct.toFixed(0) + '%"></div></div>' +
      '<div class="usage-details">$' + cost.toFixed(4) + ' this brief &middot; ' + tokens.toLocaleString() + ' tokens &middot; $' + monthly.toFixed(2) + '/mo projected &middot; $10.00 budget</div>' +
    '</div>';
}

// Market bar
const marketBar = document.getElementById('market-bar');
quotes.forEach(q => {
  const card = document.createElement('div');
  card.className = 'market-card';
  if (q.is_yield) {
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change" style="color:#888888">7d yield</div>';
  } else {
    const change = parseFloat(q.change_pct) || 0;
    const dir = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '&#9650;' : '&#9660;';
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change ' + dir + '">' + arrow + ' ' + Math.abs(change).toFixed(2) + '%</div>';
  }
  marketBar.appendChild(card);
});

// Build sections in fixed order
const sectionsMap = {};
rawSections.forEach(s => { sectionsMap[s.name] = s; });
const widgetsContainer = document.getElementById('widgets');

sectionOrder.forEach((secName, idx) => {
  const section = sectionsMap[secName] || { name: secName, stories: [] };
  const color = colors[secName] || '#888888';
  const tier = TIER_BY_COLOR[color] || 3;
  const stories = section.stories || [];
  const skipInsight = noInsight.includes(secName);
  const num = String(idx + 1).padStart(2, '0');

  let headlineBullets;
  if (stories.length > 0) {
    headlineBullets = '<ul class="widget-headlines">' +
      stories.map(s => '<li>' + escapeHtml(s.headline) + '</li>').join('') +
    '</ul>';
  } else {
    headlineBullets = '<ul class="widget-headlines"><li>No major stories this cycle</li></ul>';
  }

  const widget = document.createElement('div');
  widget.className = 'widget';
  widget.dataset.tier = tier;

  const header = document.createElement('div');
  header.className = 'widget-header';
  header.innerHTML =
    '<span class="widget-num">' + num + ' &middot;</span>' +
    '<div class="widget-info">' +
      '<div class="widget-title" style="color:' + color + '">' + escapeHtml(secName) + '</div>' +
      headlineBullets +
    '</div>' +
    '<span class="widget-count">' + stories.length + '</span>' +
    '<span class="widget-chevron">&#9656;</span>';
  header.addEventListener('click', () => widget.classList.toggle('active'));

  const body = document.createElement('div');
  body.className = 'widget-body';
  const storiesDiv = document.createElement('div');
  storiesDiv.className = 'widget-stories';

  stories.forEach(story => {
    const storyEl = document.createElement('div');
    storyEl.className = 'story';
    const headlineHtml = escapeHtml(story.headline);
    const sourceHtml = escapeHtml(story.source || '');
    const linkHtml = story.link
      ? '<a class="story-link" href="' + escapeHtml(story.link) + '" target="_blank" rel="noopener">Read source &#8594;</a>'
      : '';
    if (skipInsight) {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        linkHtml;
    } else {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span><span class="arrow">&#9656;</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        '<div class="story-details">' +
          '<div class="story-summary">' + escapeHtml(story.summary || '') + '</div>' +
          '<div class="story-insight">' +
            '<div class="insight-label">Apterreon Insight</div>' +
            escapeHtml(story.insight || '') +
          '</div>' +
          linkHtml +
        '</div>';
      storyEl.addEventListener('click', e => {
        if (e.target.tagName === 'A') return;
        e.stopPropagation();
        storyEl.classList.toggle('open');
      });
    }
    storiesDiv.appendChild(storyEl);
  });

  body.appendChild(storiesDiv);
  widget.appendChild(header);
  widget.appendChild(body);
  widgetsContainer.appendChild(widget);
});

if (edgeText) {
  document.getElementById('edge').innerHTML =
    '<div class="panel edge"><div class="panel-title">The Edge</div><p>' + escapeHtml(edgeText) + '</p></div>';
}

if (tomorrowText) {
  document.getElementById('tomorrow').innerHTML =
    '<div class="panel"><div class="panel-title">Tomorrow Watch</div><p>' + escapeHtml(tomorrowText) + '</p></div>';
}
</script>
</body>
</html>
