ies are competing aggressively to acquire Huawei AI chips following the release of DeepSeek's latest model, exposing supply constraints in domestic semiconductor capacity.", "insight": "This is a supply-side constraint that inverts the competitive dynamic: Huawei's semiconductor availability becomes the binding constraint on Chinese AI model capability, not algorithmic innovation, which means U.S. export controls have created a scarcity economics play where allocated chip access determines which Chinese firms can scale foundation models and consolidate the market.", "source": "Reuters", "link": "https://news.google.com/rss/articles/CBMixgFBVV95cUxQb2k3eWk0STFfck5fbjZoWkMzRlg5OFRGR19BM0xXV3Vfb0dCX1NralZ2SDNVQ1RvU1Zpck1mVGhNT0FfRFIwcERIaFVmTHRJRTVRVlNOQlR1a0lyVE9iLW9OT0pYQTdZc3NqdVhPeTJhajhwWlJfZUpOeFdSZmd2M3QxZ2RraG12d2xFSkk1VXloOTNtSFJXS05wb3Y5Zk94VHJwQ2Z4d0V2X1BsbWlIWm1CVTBkYkVVS1hXSy1jR0JMVURZSmc?oc=5"}, {"headline": "Chinese Green Technology Poses National Security Problem for Europe, Report Warns", "summary": "A new report flags that Chinese dominance in solar, battery, and renewable manufacturing creates strategic vulnerability for European energy independence and supply chain resilience.", "insight": "This framing accelerates European reindustrialization spending but reveals the structural bind: decarbonization requires Chinese manufacturing scale that Europe cannot replicate at cost parity, forcing a choice between energy transition speed and supply chain autonomy that will reshape industrial policy subsidies and create tariff escalation cascades.", "source": "Financial Times", "link": "https://news.google.com/rss/articles/CBMihAFBVV95cUxPQ3dXVHFqQWYxQ2M0MDNfWmhfeU03d2gyalNfcHhLVnd1RGVqeFFOZHNBUzFJX1VMNWRHOWZGajl2d1lQaFJINEV0eHFPdmt6N1NhYjZMelk5QkFFQm9UUVY4OGs5am1JZlVTZGdSQmJTV3pqdk1lN0Q3NFQ2eDhBUHo4STQ?oc=5"}]}, {"name": "Culture & Sports", "stories": [{"headline": "Summer Movie Guide 2026: What's Coming to Theaters and Streaming May Through August", "summary": "Major studios and streaming platforms are unveiling their summer slate with mix of franchise sequels, adaptations, and original content competing across theatrical and direct-to-streaming distribution.", "insight": "The portfolio composition reflects ongoing theatrical recovery uncertainty: studios are still splitting tentpole releases between streaming and theatrical, indicating they haven't restored confidence in consistent theatrical window monetization despite post-pandemic recovery, which keeps streaming content economics in structural flux.", "source": "AP News", "link": "https://news.google.com/rss/articles/CBMiiwFBVV95cUxNY09xRmZycnRLN0tmRDdWVU4tSmQ4SEMwbEQwdlRtcEJIVTBxdG9KYTUxQ0ZGaThUeGttdk1SNm5yM1VmdUU2cGVUWGd6V1MzNG5oeFdBTmJoVzNmX3k2dXg2U1VfVzU0d0xSOGlEVk9VQzJ6eGVrMS1jcUd3Qk1UN3B3SktsUDhNOGZR?oc=5"}, {"headline": "MLB Roundup: Phillies Trounce Giants After Making Managerial Change", "summary": "Philadelphia decisively beat San Francisco in a game following a managerial change, signaling potential chemistry shift in the organization.", "insight": "Mid-season managerial changes typically reflect front office desperation rather than strategic planning; the immediate positive result creates survivor bias that can blind teams to underlying structural issues, particularly in a league where April roster composition is relatively fixed.", "source": "Southern Sports Today", "link": "https://news.google.com/rss/articles/CBMitAFBVV95cUxOcnZJQ1NURUxkRjBlS19JalFYMEVfRUpoQTlrX1ZBU1g3UmFwU19Ha0tDLVYtc2ItSExWYnZsT3RUWFNrcVk0N2doR2ktLU5fY3d0Q3JaZUc1QzNMV2NNcGdMRWZxcnMxMUo1SHdFOVlxZzNnM0Q3RVVOUmdVLUJZUTRaM2MxOXhqT0RsT1J3ak5FTndxOU1ESmpFV29ISzZLSlVkVzdZcFpHRlZ4dGdKYzlRSVc?oc=5"}]}, {"name": "Boston", "stories": [{"headline": "Boston Candy Store Robbed at Knifepoint", "summary": "A retail location in Boston was targeted in an armed robbery, continuing a pattern of street-level theft in urban retail environments.", "insight": "This reflects post-pandemic urban crime dynamics where retail margins have compressed while organized retail crime networks have professionalized, creating a permanent structural shift in urban loss rates that pushes insurance costs higher and accelerates retail consolidation.", "source": "NBC Boston", "link": "https://news.google.com/rss/articles/CBMijgFBVV95cUxQcVA3Qy1JeUR0SUlGQ2lmcjVYTk5yWXF3MzVxTHFxZlNycnh4VkU2Sno0VmVfd01NTWlFYmtBOF9FRGJEVk5IazRnWm1JRW5YN2lvTFQ2MzZRUTdyY3k0cmNfOExmQzJZNW5SX05fWUJTVTBoS1JjZlduczRUeE1jQnJMQUxnbWlXYndXRHg30gGWAUFVX3lxTE5mVnY4NFhveXNyUW9nVE5hOXVuZmNQdnZHWlR3V0NoOVBBa1hfRE5mRzh4UWVmaUtBdHY2OC1GQlE0Wm9LLWZzYVcwa3NST0tlSTUtMGRzY0MtQ3NEOVJJWnFCWEkxUDYyMk9kMTV1TmJsZkNLNng3RUN5bWFleFJoblpHX0JYTHdlUVJtNGVQa2dhLTJhQQ?oc=5"}, {"headline": "Suspects Arrested in Everett Bank Robbery; Unconnected to Boston Crime Pattern", "summary": "Law enforcement arrested individuals suspected of a bank robbery in Everett, explicitly noting the incident is unrelated to recent Boston-area thefts.", "insight": "The administrative clarification that this robbery is disconnected from the broader pattern is itself noteworthy: it signals police concern about public perception of organized crime proliferation, suggesting law enforcement is managing optics around crime clustering even as underlying trends may remain concerning.", "source": "WCVB", "link": "https://news.google.com/rss/articles/CBMihgFBVV95cUxPekdONjQ4ZWNzOHhtZkxZcTRjaHBfOGVDem4yRnF2ekFFQWJEWXVzSVlpSzgzNnZzbnZRSnM5ejVUTVB3VTNDbHFERWowNi1fQUtZcTBJZzd2QnBxTDJtcFJyTjJQVFB1RFNlaU5KdVR6Mkk0YmxoZS0wclh6T0xIU0FJRDZ6UQ?oc=5"}]}];
const edgeText = "The Fed decision today is the inflection point where three structural pressures converge: U.S. equity markets are pricing geopolitical risk premium on Iran (via oil at $115) while Chinese AI firms are experiencing semiconductor constraints that consolidate market share, and capital flows are fragmenting between dollar safety, commodity hedges, and parallel web infrastructure for AI agents. The allocator playbook is splitting between traditional macro hedging (long dollar, long oil) and structural picks on supply-chain winners like Huawei-dependent Chinese AI platforms and foundational model infrastructure companies building outside incumbent cloud economics.";
const tomorrowText = "";
const colors = {"Breaking News": "#CC0000", "Finance & Markets": "#CC0000", "Politics & Policy": "#7A1010", "AI & Technology": "#7A1010", "International": "#888888", "Culture & Sports": "#888888", "Boston": "#888888"};
const quotes = [{"ticker": "SPY", "label": "S&P 500", "price": "711.69", "change_pct": "-0.4866"}, {"ticker": "IWB", "label": "Russell 1000", "price": "389.07", "change_pct": "-0.5292"}, {"ticker": "IWM", "label": "Russell 2000", "price": "273.91", "change_pct": "-1.1655"}, {"ticker": "EFA", "label": "MSCI EAFE", "price": "100.96", "change_pct": "-0.4143"}, {"ticker": "FFR", "label": "MM Yield (avg)", "price": "3.64%", "change_pct": "0", "is_yield": true}];
const sectionOrder = ["Breaking News", "Finance & Markets", "Politics & Policy", "AI & Technology", "International", "Culture & Sports", "Boston"];
const noInsight = ["Breaking News"];

const TIER_BY_COLOR = { '#CC0000':1, '#7A1010':2, '#888888':3 };

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\"/g,'&quot;').replace(/'/g,'&#39;');
}

// Usage banner
if (usageInfo && usageInfo.cost_monthly_projected !== undefined) {
  const monthly = usageInfo.cost_monthly_projected;
  const cost = usageInfo.cost_this_call || 0;
  const tokens = usageInfo.total_tokens || 0;
  const budget = 10.0;
  const pct = Math.min(100, (monthly / budget) * 100);
  let barColor, status;
  if (monthly < 2)      { barColor = '#5599CC'; status = 'LOW'; }
  else if (monthly < 5) { barColor = '#888888'; status = 'MODERATE'; }
  else                  { barColor = '#CC0000'; status = 'HIGH'; }

  document.getElementById('usage').innerHTML =
    '<div class="usage-banner">' +
      '<div class="usage-row">' +
        '<span class="usage-label">API Usage</span>' +
        '<span class="usage-status" style="color:' + barColor + '">' + status + '</span>' +
      '</div>' +
      '<div class="usage-bar"><div class="usage-bar-fill" style="background:' + barColor + ';width:' + pct.toFixed(0) + '%"></div></div>' +
      '<div class="usage-details">$' + cost.toFixed(4) + ' this brief &middot; ' + tokens.toLocaleString() + ' tokens &middot; $' + monthly.toFixed(2) + '/mo projected &middot; $10.00 budget</div>' +
    '</div>';
}

// Market bar
const marketBar = document.getElementById('market-bar');
quotes.forEach(q => {
  const card = document.createElement('div');
  card.className = 'market-card';
  if (q.is_yield) {
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change" style="color:#888888">7d yield</div>';
  } else {
    const change = parseFloat(q.change_pct) || 0;
    const dir = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '&#9650;' : '&#9660;';
    card.innerHTML =
      '<div class="label">' + escapeHtml(q.label) + '</div>' +
      '<div class="price">' + escapeHtml(q.price) + '</div>' +
      '<div class="change ' + dir + '">' + arrow + ' ' + Math.abs(change).toFixed(2) + '%</div>';
  }
  marketBar.appendChild(card);
});

// Build sections in fixed order
const sectionsMap = {};
rawSections.forEach(s => { sectionsMap[s.name] = s; });
const widgetsContainer = document.getElementById('widgets');

sectionOrder.forEach((secName, idx) => {
  const section = sectionsMap[secName] || { name: secName, stories: [] };
  const color = colors[secName] || '#888888';
  const tier = TIER_BY_COLOR[color] || 3;
  const stories = section.stories || [];
  const skipInsight = noInsight.includes(secName);
  const num = String(idx + 1).padStart(2, '0');

  let headlineBullets;
  if (stories.length > 0) {
    headlineBullets = '<ul class="widget-headlines">' +
      stories.map(s => '<li>' + escapeHtml(s.headline) + '</li>').join('') +
    '</ul>';
  } else {
    headlineBullets = '<ul class="widget-headlines"><li>No major stories this cycle</li></ul>';
  }

  const widget = document.createElement('div');
  widget.className = 'widget';
  widget.dataset.tier = tier;

  const header = document.createElement('div');
  header.className = 'widget-header';
  header.innerHTML =
    '<span class="widget-num">' + num + ' &middot;</span>' +
    '<div class="widget-info">' +
      '<div class="widget-title" style="color:' + color + '">' + escapeHtml(secName) + '</div>' +
      headlineBullets +
    '</div>' +
    '<span class="widget-count">' + stories.length + '</span>' +
    '<span class="widget-chevron">&#9656;</span>';
  header.addEventListener('click', () => widget.classList.toggle('active'));

  const body = document.createElement('div');
  body.className = 'widget-body';
  const storiesDiv = document.createElement('div');
  storiesDiv.className = 'widget-stories';

  stories.forEach(story => {
    const storyEl = document.createElement('div');
    storyEl.className = 'story';
    const headlineHtml = escapeHtml(story.headline);
    const sourceHtml = escapeHtml(story.source || '');
    const linkHtml = story.link
      ? '<a class="story-link" href="' + escapeHtml(story.link) + '" target="_blank" rel="noopener">Read source &#8594;</a>'
      : '';
    if (skipInsight) {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        linkHtml;
    } else {
      storyEl.innerHTML =
        '<div class="story-headline"><span>' + headlineHtml + '</span><span class="arrow">&#9656;</span></div>' +
        '<div class="story-source">' + sourceHtml + '</div>' +
        '<div class="story-details">' +
          '<div class="story-summary">' + escapeHtml(story.summary || '') + '</div>' +
          '<div class="story-insight">' +
            '<div class="insight-label">Apterreon Insight</div>' +
            escapeHtml(story.insight || '') +
          '</div>' +
          linkHtml +
        '</div>';
      storyEl.addEventListener('click', e => {
        if (e.target.tagName === 'A') return;
        e.stopPropagation();
        storyEl.classList.toggle('open');
      });
    }
    storiesDiv.appendChild(storyEl);
  });

  body.appendChild(storiesDiv);
  widget.appendChild(header);
  widget.appendChild(body);
  widgetsContainer.appendChild(widget);
});

if (edgeText) {
  document.getElementById('edge').innerHTML =
    '<div class="panel edge"><div class="panel-title">The Edge</div><p>' + escapeHtml(edgeText) + '</p></div>';
}

if (tomorrowText) {
  document.getElementById('tomorrow').innerHTML =
    '<div class="panel"><div class="panel-title">Tomorrow Watch</div><p>' + escapeHtml(tomorrowText) + '</p></div>';
}
</script>
</body>
</html>
